<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GZOWO</title>

  <!-- Fonts: JetBrains Mono (HUD/mono) + Space Grotesk (body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles: tokens first (single source of truth), then base chrome, then module sheets -->
  <link rel="stylesheet" href="css/design-tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/hud.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/widgets.css" />
  <link rel="stylesheet" href="css/intro.css" />

  <!-- Import map MUST come before main.js. Pure ES modules from CDN, no build step. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "@google/genai": "https://esm.run/@google/genai@1",
      "@picovoice/porcupine-web": "https://esm.run/@picovoice/porcupine-web@3",
      "@picovoice/web-voice-processor": "https://esm.run/@picovoice/web-voice-processor@4"
    }
  }
  </script>
</head>
<body data-theme="mono" data-ui="intro">
  <div id="grid-bg"></div>
  <canvas id="orb-canvas"></canvas>
  <main id="widget-layer"></main>
  <header id="hud-top"></header>
  <footer id="dock"></footer>
  <aside id="chat-panel" hidden></aside>
  <div id="toast-layer"></div>
  <div id="intro-layer"></div>

  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:monospace;text-align:center;padding:24px;z-index:9999">
      Gzowo potrzebuje JavaScriptu, człowieku. Włącz go w przeglądarce i odpal jeszcze raz.
    </div>
  </noscript>

  <script type="module" src="js/main.js"></script>
</body>
</html>
